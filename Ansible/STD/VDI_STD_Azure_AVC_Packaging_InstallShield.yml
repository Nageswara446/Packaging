---
- name: Enter the Matrix to get hostname.
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: add host to local inventory
      add_host:
        groups: VDI_STD_Master_Local
        name: "{{ HostNameFact }}"

- name: VDI AVCDedicated Build playbook
  hosts: VDI_STD_Master_Local
  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_read_timeout_sec: 900
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: credssp
    reboot_timeout: 3000
    OfficeSKU: "{{ OfficeSKU }}"
    PackagingTool: "{{ PackagingTool }}"
    AOClient: "{{ AOClient }}"
    AdminRights: "{{ AdminRights }}"
    EmailAddress: "{{ EmailAddress }}"

  gather_facts: false
  tasks:
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Ensure PackageInstallationTracker directory exists for /source/package
      win_file:
        path: C:\Temp\sources\Packages\DedCAVCPOC\
        state: directory

    - name: Copy DSC Modules
      win_copy:
        src: "{{ item }}"
        dest: C:\Program Files\WindowsPowerShell\Modules
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\HCL\DSC\'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Copy Folders
      win_copy:
        src: "{{ item }}"
        dest: C:\Windows
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\AVC'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\SysWOW64'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Add shortcut for VM Decommission
      win_shell: powershell.exe -ExecutionPolicy Bypass -File "C:\Windows\AVC\Scripts\USER\SelfServiceVMDecommission\ShortCutIS.ps1"

    ################################################################################
    #Copy and installtion of packages in /source/packages directory
    ################################################################################

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\DedCAVCPOC\'
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\Visual_Studio_Redistributables\C++_2012'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\LanguagesAndOptionalFeatures'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\1947_MS_VCRedis2015to2022_14.42.34433.0_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\2840_Microsoft_WindowsDesktopRuntime_8.0.21_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\CrowdStrike\Dedicated_Singlesession\3524_CrowdStrike_WindowsSensor_7.31.20309.0_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Citrix\VDA\2411\SingleSession'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Qualys\674_Qualys_CloudAgent_5.6.0.20_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Flexera_AdminStudio2025_30.0.10146_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\OfficeM365\64Bit\16.0.19127.20532'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Allianz\AZCA Manager\03.00.6000'

       

      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: MS_Office365 64bit (Build 16.0.19127.20532)
      win_dsc:
        resource_name: InstallerClass
        PackageName : 'Office_365_64bit'
        DetectionProductRegistryKeys : 'HKLM:\Software\Microsoft\Office\ClickToRun\Configuration'
        Ensure :  'Present'
        Executable : 'AVCRAPPS_64-bit_configure.cmd'
        Source : 'C:\Temp\sources\Packages\DedCAVCPOC\16.0.19127.20532\'
      delegate_to: "{{ HostNameFact }}"

    - name: Reboot before LanguagePack Install
      win_reboot:
        post_reboot_delay: 30
        reboot_timeout: 1500

    - name: Installation of LanguagePacks
      win_dsc:
        resource_name: InstallerClass
        PackageName: "Languagepacks"
        Ensure: "Present"
        Executable: "AVC_install.cmd"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\LanguagesAndOptionalFeatures\'
        DetectionFilePath: 'C:\Windows\Installer\install_languagepacks.log'
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2012 x86;  AppId -
      win_dsc:
        resource_name: Package
        Name: "Microsoft Visual C++ 2012 x86 Additional Runtime - 11.0.61030"
        ProductId: ""
        Arguments: "/Q"
        Ensure: "Present"
        Path: 'C:\Temp\sources\Packages\DedCAVCPOC\C++_2012\vcredist_x86.exe'
        LogPath: 'c:\Windows\Installer\Visual_C++_2012_x86_Redist.log'
      delegate_to: "{{ HostNameFact }}"

    # - name: Install Visual C++ 2013 x86;  AppId -
    #   win_dsc:
    #     resource_name: Package
    #     Name: "Microsoft Visual C++ 2013 x86 Additional Runtime - 12.0.40660"
    #     ProductId: ""
    #     Arguments: "/Install /quiet /norestart"
    #     Ensure: "Present"
    #     Path: 'C:\Temp\sources\Packages\DedCAVCPOC\2013\vcredist_x86.exe'
    #     LogPath: 'c:\Windows\Installer\Visual_C++_2013_x86_Redist.log'
    #   delegate_to: "{{ HostNameFact }}"

    # - name: Install Visual C++ 2013 x64;  AppId -
    #   win_dsc:
    #     resource_name: Package
    #     Name: "Microsoft Visual C++ 2013 x64 Additional Runtime - 12.0.40660"
    #     ProductId: ""
    #     Arguments: "/Install /quiet /norestart"
    #     Ensure: "Present"
    #     Path: 'C:\Temp\sources\Packages\DedCAVCPOC\2013\vcredist_x64.exe'
    #     LogPath: 'c:\Windows\Installer\Visual_C++_2013_x64_Redist.log'
    #   delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2015_2022_x64_x86;  AppId -  1_C_plus_plus
      win_dsc:
        resource_name: InstallerClass
        PackageName: "Install_Visual_C++_2015_2022"
        Ensure: "Present"
        Executable: "Invoke-AppDeployToolkit.exe"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\1947_MS_VCRedis2015to2022_14.42.34433.0_PKG_R1\'
      delegate_to: "{{ HostNameFact }}"


    - name: Microsoft Windows Desktop Runtime - 8.0.21 (x86);  AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName: "Microsoft Windows Desktop Runtime - 8.0.18 (x86)"
        Ensure: "Present"
        Executable: "Invoke-AppDeployToolkit.exe"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\2840_Microsoft_WindowsDesktopRuntime_8.0.21_PKG_R1\'
      delegate_to: "{{ HostNameFact }}"      

    - name: AdminStudio 2025 R2;  AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName: "AdminStudio 2025 R2"
        Ensure: "Present"
        Executable: "Invoke-AppDeployToolkit.exe"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\Flexera_AdminStudio2025_30.0.10146_PKG_R1\'
        DetectionProductRegistryKeys: 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\{D6AB22DC-F133-4605-A75B-87A6BF3AE858}'
      delegate_to: "{{ HostNameFact }}"


    - name: Citrix_Virtual_Desktop_Agent_Server_OS_2411;  AppId - ?;
      win_dsc:
        resource_name: InstallerClass
        PackageName: "VDAServerOS"
        Ensure: "Present"
        Executable: "VDAWorkstationSetup_2411_AOClient.cmd"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\SingleSession\'
        DetectionFilePath : 'C:\Program Files\Citrix\Virtual Desktop Agent\BrokerAgent.exe'
      delegate_to: "{{ HostNameFact }}"

    - name: 674_Qualys_CloudAgent_5.6.0.20_PKG_R1;  AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName: "674_Qualys_CloudAgent_5.6.0.20_PKG_R1"
        Ensure: "Present"
        Executable: "Deploy-Application.exe"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\674_Qualys_CloudAgent_5.6.0.20_PKG_R1\'
        DetectionProductRegistryKeys: 'HKLM:\SOFTWARE\AVC\Packages\674_Qualys_CloudAgent_5.6.0.20_PKG_R1'
      delegate_to: "{{ HostNameFact }}"

    - name: 22688_Allianz_AZCAManager_03.00.6000_PKG_R1;  AppId - WAPP0023055
      win_dsc:
        resource_name: InstallerClass
        PackageName: "22688_Allianz_AZCAManager_03.00.6000_PKG_R1"
        Ensure: "Present"
        Executable: "Deploy-Application.exe"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\03.00.6000\'
        DetectionProductRegistryKeys: 'HKLM:\SOFTWARE\DXC\Packages\22688_Allianz_AZCAManager_03.00.6000_PKG_R1'
      delegate_to: "{{ HostNameFact }}"    

    - name: Allianz_AZCAManager_LogFolder_Redirect
      win_dsc:
        resource_name: Registry
        Ensure: "Present"
        Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\ALLIANZ\AZCAManager'
        ValueName: "LogFile"
        ValueData: 'C:\AMOS\LOGS\azcamanage.net.log'
        ValueType: "STRING"
        Force: true

    #Citrix Optimizer Tool
    - name: CitrixOptimizerTool
      win_shell: C:\Windows\AVC\CitrixOptimizerTool\CtxOptimizerEngine.ps1 -Source Citrix_Windows_11_2009_AOClient.xml -Mode execute
      ignore_errors: true


    # Set SYSTEM Proxy for update section

    - name: Set a proxy with a specific port with a bypass list
      win_http_proxy:
        proxy: zsc-fra.emea.lb.sec.allianz:8080

    - name: Add Microsoft UWP application
      win_shell: C:\Windows\AVC\Scripts\BUILD\AddUWPapps.ps1
      ignore_errors: true

    # Removal of SYSTEM proxy

    - name: Remove any proxy settings
      win_http_proxy:
        proxy: ""
        bypass: ""

################# END OF APP INSTALL PART ########################

################# WSUS PART ###################################
    - name: WinUpdateFix. Must be run after all updates are installed, clear updates db prevent corruption [SHELL]
      win_shell: |
        $ErrorActionPreference = 'Stop'
        Stop-Service -Name wuauserv; Start-Sleep -Seconds 10
        Invoke-Expression -Command 'cmd /c del c:\windows\SoftwareDistribution /q /s'
        Start-Sleep -Seconds 10
        Start-Service -Name wuauserv
      ignore_errors: yes

    - name: Reboot Before WSUS part
      win_reboot:
        post_reboot_delay: 120
      register: reboot
      retries: 5
      delay: 60
      until: reboot is succeeded

    - name: Enable Windows Update service
      win_service:
        name: "{{ item }}"
        start_mode: auto
        state: started
        force_dependent_services: yes
      loop:
        - 'wuauserv'
      register: windows_update
      retries: 5
      delay: 20
      until: windows_update is succeeded
      ignore_errors:  true

    - name: WSUS registry key values
      win_dsc:
        resource_name: Registry
        Ensure      : 'Present'
        Key         : "{{ item.Key }}"
        ValueName   : "{{ item.ValueName }}"
        ValueType   : "{{ item.ValueType }}"
        ValueData   : "{{ item.ValueData }}"
        Force       : true
      loop:
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate', ValueName: 'DoNotConnectToWindowsUpdateInternetLocations', ValueType: 'DWORD', ValueData: '0' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU', ValueName: 'UseWUServer', ValueType: 'DWORD', ValueData: '1' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU', ValueName: 'AutoInstallMinorUpdates', ValueType: 'DWORD', ValueData: '0' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU', ValueName: 'NoAutoUpdate', ValueType: 'DWORD', ValueData: '1' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Wow6432Node\Citrix\Dazzle', ValueName: 'ConfigMgrSupportEnabled', ValueType: 'String', ValueData: 'false' }
      register: wsus_registry_values
      retries: 5
      delay: 60
      until: wsus_registry_values is succeeded

    - name: WSUS server set internal server
      win_dsc:
        resource_name: Registry
        Ensure      : 'Present'
        Key         : 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate'
        ValueName   : "{{ item }}"
        ValueType   : 'String'
        ValueData   : 'http://aalwsufrk101.wwg00m.rootdom.net:8530'
        Force       : true
      loop:
        - 'WUServer'
        - 'WUStatusServer'
        - 'UpdateServiceUrlAlternate'
      register: wsus_server
      retries: 5
      delay: 60
      until: wsus_server is succeeded

    - name: Reboot Action for WSUS Stuff [REBOOT]
      win_reboot:
        post_reboot_delay: 120
      register: reboot
      retries: 5
      delay: 60
      until: reboot is succeeded

    - name: Run init scan from PS
      win_shell: usoclient StartScan
      register: shell_1
      retries: 5
      delay: 60
      until: shell_1 is succeeded

    - name: Run wuauclt command
      win_shell: wuauclt /detectnow
      register: shell_2
      retries: 5
      delay: 60
      until: shell_2 is succeeded

    - name: Run wuauclt command
      win_shell: wuauclt /register
      register: shell_3
      retries: 5
      delay: 60
      until: shell_3 is succeeded

    - name: Run wuauclt command
      win_shell: wuauclt /reportnow
      register: shell_4
      retries: 5
      delay: 60
      until: shell_4 is succeeded

    - pause:
        minutes: 2

    - name: Init search for updates to force registration loop
      win_updates:
        server_selection: managed_server
        category_names:
          - Application
          - Connectors
          - CriticalUpdates
          - DefinitionUpdates
          - DeveloperKits
          - FeaturePacks
          - Guidance
          - SecurityUpdates
          - ServicePacks
          - Tools
          - UpdateRollups
          - Updates
        state: searched
        log_path: C:\temp\ansible_wu.txt
      retries: 5
      delay: 10
      register: result
      until: result is succeeded
      ignore_errors: yes

    - name: Download updates
      win_updates:
        server_selection: managed_server
        category_names:
          - Application
          - Connectors
          - CriticalUpdates
          - DefinitionUpdates
          - DeveloperKits
          - FeaturePacks
          - Guidance
          - SecurityUpdates
          - ServicePacks
          - Tools
          - UpdateRollups
          - Updates
        state: downloaded
      register: download_updates
      retries: 5
      delay: 60
      until: download_updates is succeeded

    - name: Install all other approved updates from WSUS
      win_updates:
        server_selection: managed_server
        category_names:
          - Application
          - Connectors
          - CriticalUpdates
          #- DefinitionUpdates
          - DeveloperKits
          - FeaturePacks
          - Guidance
          - SecurityUpdates
          - ServicePacks
          - Tools
          - UpdateRollups
          - Updates
        blacklist:
          #- KB3104046
        state: installed
        reboot: no
        log_path: C:\Windows\AVC\Logging\ansible_updates_STD.txt
      register: install_updates
      retries: 2
      delay: 60
      until: install_updates is succeeded

    - name: Ensure WinRM starts when the system has settled and is ready to work reliably
      win_service:
        name: WinRM
        start_mode: delayed
      register: winrm_start
      retries: 5
      delay: 60
      until: winrm_start is succeeded

    - name: Reboot after WSUS part
      win_reboot:
        post_reboot_delay: 120
      register: reboot
      retries: 5
      delay: 60
      until: reboot is succeeded

################# WSUS PART END ##############################
    ###     When we get new version of crowdstrike, just copy the file "WindowsSensor.LionLanner.exe" to the oneavc source path.     ####
    ###     Do not replace the "install.cmd" file in oneavc source path as this is specificlly designed for Oneavc                   ####
    ###     CrowdStrike 7.12 as part of PR009_24                                                                                     ###
      
    - name: CrowdStrike Windows Sensor 7.31; AppId - ? #latest
      win_dsc:
        resource_name: InstallerClass
        PackageName: "CrowdStrike Windows Sensor" ## After installation of CrowdStrike, do not reboot.
        Ensure: "Present"
        Executable: "Invoke-AppDeployToolkit.exe"
        Source: 'C:\Temp\sources\Packages\DedCAVCPOC\3524_CrowdStrike_WindowsSensor_7.31.20309.0_PKG_R1\'
        # DetectionProductUninstallRegKeyValue: "{a28e660a-e516-486f-9b6b-834d8e760ac1}"
      delegate_to: "{{ HostNameFact }}"

    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
        - "Allianz_packages"
        - "avc-apm"
        - "sources"
        - "source$"
