- name: Enter the Matrix to get hostname.
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: add host to local inventory
      add_host:
        groups: VDI_STD_Master_Local
        name: "{{ HostNameFact }}"

- name: VDI AVCDedicated Build playbook
  hosts: VDI_STD_Master_Local
  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_read_timeout_sec: 900
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: credssp
    reboot_timeout: 3000
    OfficeSKU: "{{ OfficeSKU }}"
    EmailAddress: "{{ EmailAddress }}"

  gather_facts: false
  tasks:
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Ensure PackageInstallationTracker directory exists for /source/package
      win_file:
        path: C:\Temp\sources\Packages\
        state: directory

    # - name: Set PS Execution Policy
    #   win_dsc:
    #     resource_name: PowerShellExecutionPolicy
    #     ExecutionPolicyScope: 'LocalMachine'
    #     ExecutionPolicy: 'Unrestricted'

    - name: Copy DSC Modules
      win_copy:
        src: "{{ item }}"
        dest: C:\Program Files\WindowsPowerShell\Modules
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\HCL\DSC\'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Copy Folders
      win_copy:
        src: "{{ item }}"
        dest: C:\Windows
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\AVC'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\SysWOW64'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\'
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Citrix\VDA\2411\SingleSession'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Allianz\AZCA Manager\03.00.6000'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Copy Intune-Sync.ps1 to TEMP
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp'
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\LE VM\'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"
    
    - name: Run Intune Script
      win_shell: powershell.exe -File C:\Temp\CreateScheduledTask.ps1

      


    - name: Citrix_Virtual_Desktop_Agent_Server_OS_2411;  AppId - ?;
      win_dsc:
        resource_name: InstallerClass
        PackageName: "VDAServerOS"
        Ensure: "Present"
        Executable: "VDAWorkstationSetup_2411_AOClient.cmd"
        Source: 'C:\Temp\sources\Packages\SingleSession\'
        DetectionFilePath : 'C:\Program Files\Citrix\Virtual Desktop Agent\BrokerAgent.exe'
      delegate_to: "{{ HostNameFact }}"

    - name: CitrixOptimizerTool
      win_shell: C:\Windows\AVC\CitrixOptimizerTool\CtxOptimizerEngine.ps1 -Source Citrix_Windows_11_2009_AOClient.xml -Mode execute
      ignore_errors: true

    - name: Set registry value for LogoffCheckSysModules
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Citrix\wfshell\TWI'
        name: "LogoffCheckSysModules"
        data: "Analytics.exe,SelfService.exe,UpmUserMsg.exe,UiPathRemoteRuntime.exe, sbus.exe, sapcms.exe, fwcMgmt.exe, sbus.exe32, fwcMgmt.exe32, EnterpriseAgent.exe, EnterpriseAgent.exe32, adb.exe, adb.exe32, splwow64.exe, cs5ServiceManager.exe, cs6servicemanager.exe, Dserui.exe, taskhAppVShNotify.exe, taskhost.exe, rsshagent.exe, hpwuschd2.exe, deadem.exe, vmtoolsd.exe, buildnotification.exe, wfshell.exe, reg.exe, acroRD32.exe, robocopy.exe, winlogon.exe, PTIM.exe, csrss.exe, dwm.exe, LogonUI.exe, IdentityAgent.exe, OneDrive.exe, Microsoft.Sharepoint.exe"
        type: string
        state: present

      #Start menu may stop https://support.citrix.com/s/article/CTX692398-start-menu-may-stop-responding-if-december-2024-or-newer-security-updates-installed-on-windows-11?language=en_US
    - name: Add registry edit for Citrix Hooks
      win_regedit:
        path: 'HKLM:\SOFTWARE\Citrix\CtxHook\AppInit_DLLs\UWPBridgeHook\startmenuexperiencehost.exe\Citrix.Hooking.Uwp.dll\CtxWinUiXamlHook.dll\vccorlib140_app.dll'
        name: "FilePathName"
        data: 'C:\Windows\SystemApps\MicrosoftWindows.Client.Photon_cw5n1h2txyewy\vccorlib140_app.dll'
        type: string
        state: present
        force: yes

    - name: Add registry entry for VCRUNTIME140_1_APP.dll
      win_regedit:
        path: 'HKLM:\SOFTWARE\Citrix\CtxHook\AppInit_DLLs\UWPBridgeHook\startmenuexperiencehost.exe\Citrix.Hooking.Uwp.dll\CtxWinUiXamlHook.dll\VCRUNTIME140_1_APP.dll'
        name: "FilePathName"
        data: 'C:\Windows\SystemApps\MicrosoftWindows.Client.Photon_cw5n1h2txyewy\VCRUNTIME140_1_APP.dll'
        type: string
        state: present
        force: yes
    
    - name: 22688_Allianz_AZCAManager_03.00.6000_PKG_R1;  AppId - WAPP0023055
      win_dsc:
        resource_name: InstallerClass
        PackageName: "22688_Allianz_AZCAManager_03.00.6000_PKG_R1"
        Ensure: "Present"
        Executable: "Deploy-Application.exe"
        Source: 'C:\Temp\sources\Packages\03.00.6000\'
        DetectionProductRegistryKeys: 'HKLM:\SOFTWARE\DXC\Packages\22688_Allianz_AZCAManager_03.00.6000_PKG_R1'
      delegate_to: "{{ HostNameFact }}"

    

    - name: Allianz_AZCAManager_LogFolder_Redirect
      win_dsc:
        resource_name: Registry
        Ensure: "Present"
        Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\ALLIANZ\AZCAManager'
        ValueName: "LogFile"
        ValueData: 'C:\AMOS\LOGS\azcamanage.net.log'
        ValueType: "STRING"
        Force: true


    

# ################# END OF APP INSTALL PART ########################

    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
        - "Allianz_packages"
        - "avc-apm"
        - "sources"
        - "source$"
