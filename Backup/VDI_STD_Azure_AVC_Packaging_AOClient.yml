        DetectionProductRegistryKeys  : 'HKLM:\SOFTWARE\AVC\Packages\25303_Zscaler_Clientconnector_4.4.0.294_PKG_R2'
      register: Zscaler
      retries: 5
      delay: 60
      until: Zscaler is succeeded
      delegate_to: "{{ HostNameFact }}"
      ignore_errors: true

