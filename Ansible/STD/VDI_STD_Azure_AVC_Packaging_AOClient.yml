      delegate_to: "{{ HostNameFact }}"
      ignore_errors: true

    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
        - "Allianz_packages"
        - "avc-apm"
        - "sources"
        - "source$"
