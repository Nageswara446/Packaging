---
- name: Enter the Matrix to get hostname.
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: add host to local inventory
      add_host:
        groups: VDI_STD_Master_Local
        name: "{{ HostNameFact }}"

- name: VDI AVCDedicated Build playbook
  hosts: VDI_STD_Master_Local
  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_read_timeout_sec: 900
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: credssp
    reboot_timeout: 3000
    OfficeSKU: "{{ OfficeSKU }}"
    EmailAddress: "{{ EmailAddress }}"

  gather_facts: false
  tasks:
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Ensure PackageInstallationTracker directory exists for /source/package
      win_file:
        path: C:\Temp\sources\Packages\AOClient\
        state: directory

    - name: Copy DSC Modules
      win_copy:
        src: "{{ item }}"
        dest: C:\Program Files\WindowsPowerShell\Modules
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\HCL\DSC\'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Copy Folders
      win_copy:
        src: "{{ item }}"
        dest: C:\Windows
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\AVC'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\SysWOW64'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    ##############################################################################
    ####Copy and installtion of packages in /source/packages directory
    ##############################################################################

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\AOClient\'
        remote_src: yes
      loop:
        
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Adobe\Dedicated_singleession\Acrobat_Reader_DC_25.001.20997'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Allianz\AZCA Manager\03.00.6000'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Allianz\AllianzFonts'
        # - '\\rappsce1repo.file.core.windows.net\sources\Packages\Cisco\Singlesession\1582_CiscoSystems_Webex_45.4.1.32356_PKG_R3' 
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Citrix\VDA\2507\SingleSession'
        # - '\\rappsce1repo.file.core.windows.net\sources\Packages\Citrix\WorkSpaceApp\1565_Citrix_Workspace2503_25.3.2.196_PKG_R6_AO'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Citrix\WorkSpaceApp\Workspace_25.8.10.36'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Cisco\979_Cisco_Webex_44.10.1.31141_PKG_R1' 
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\CrowdStrike\Dedicated_Singlesession\3524_CrowdStrike_WindowsSensor_7.31.20309.0_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\Visual_Studio_Redistributables\C++_2012'
        #- '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\LanguagesAndOptionalFeatures'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\1947_MS_VCRedis2015to2022_14.42.34433.0_PKG_R1'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\2840_Microsoft_WindowsDesktopRuntime_8.0.21_PKG_R1'
       # - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\OfficeM365\64Bit\16.0.17928.20538'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\3259_Teams_26005.213.4315.4117'
        # - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\OneDrive\29075_Microsoft_OneDrive_25.056.0324.0003_PKG_R1' #new
