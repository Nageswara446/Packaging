---
- name:  Enter the Matrix to get hostname.
  hosts: localhost
  connection: local
  gather_facts: true
  
  tasks:
    - name: add host to local inventory
      add_host:
        groups: VDI_STD_Master_Local
        name: "{{ HostNameFact }}"

- name:  VDI AVCDedicated Build playbook
  hosts: VDI_STD_Master_Local
  vars: 
      ansible_connection: winrm
      ansible_port: 5985
      ansible_winrm_read_timeout_sec: 900
      ansible_winrm_server_cert_validation: ignore
      ansible_winrm_transport: credssp
      reboot_timeout: 3000
      OfficeSKU: "{{ OfficeSKU }}"
      EmailAddress: "{{ EmailAddress }}"
      domain_password: "{{ domain_password }}"
      domain_username: "{{ domain_username }}"

  gather_facts: false
  tasks:
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Ensure PackageInstallationTracker directory exists for /source/package
      win_file:
        path: C:\Temp\sources\Packages\AOClient\
        state: directory

    - name: Ensure PackageInstallationTracker directory exists for /CoreApps Packages
      win_file:
        path: C:\Temp\avc-apm\Package\CoreApps Packages\
        state: directory

    - name: Ensure PackageInstallationTracker directory exists for /source$
      win_file:
        path: C:\Temp\source$\SE2_Packages\
        state: directory
    
    - name: Ensure PackageInstallationTracker directory exists for /source$
      win_file:
        path: C:\Temp\Allianz_packages\
        state: directory

    - name: Copy DSC Modules
      win_copy:
        src: "{{ item }}"
        dest: C:\Program Files\WindowsPowerShell\Modules
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\HCL\DSC\'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"

    - name: Copy Folders
      win_copy:
        src: "{{ item }}"
        dest: C:\Windows
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Copy\AVC'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Copy\SysWOW64'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"

    - name: Add shortcut for VM Decommission
      win_shell: C:\Windows\AVC\Scripts\USER\SelfServiceVMDecommission\ShortCut.ps1
      ignore_errors: true

################################################################################
#Copy and installtion of packages in /source/packages directory
################################################################################
    - name: Ensure PackageInstallationTracker directory exists for /source/packages
      win_file:
        path: C:\Temp\sources\Packages\AOClient\
        state: directory

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\AOClient\'
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\Microsoft\Visual_Studio_Redistributables\C++_2012'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\LanguagesAndOptionalFeatures'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Visual_Studio_Redistributables\2013'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\Microsoft\Visual_Studio_Redistributables\C++_2015-2022'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Net6DesktopRuntime'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Citrix\VDA\2411\SingleSession'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"

    - name: Reboot before LanguagePack Install
      win_reboot:
        post_reboot_delay: 30  
        reboot_timeout: 1500
      
    - name: Installation of LanguagePacks
      win_dsc: 
        resource_name: InstallerClass 
        PackageName         : 'Languagepacks'
        Ensure              : 'Present'
        Executable          : 'AVC_install.cmd'
        Source              : 'C:\Temp\sources\Packages\AOClient\LanguagesAndOptionalFeatures\'
        DetectionFilePath   : 'C:\Windows\Installer\install_languagepacks.log'
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2012 x86;  AppId -  
      win_dsc: 
        resource_name: Package 
        Name  : 'Microsoft Visual C++ 2012 x86 Additional Runtime - 11.0.61030' 
        ProductId : ''
        Arguments : '/Q'
        Ensure :  'Present'
        Path : 'C:\Temp\sources\Packages\AOClient\C++_2012\vcredist_x86.exe'
        LogPath : 'c:\Windows\Installer\Visual_C++_2012_x86_Redist.log' 
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2013 x86;  AppId -  
      win_dsc: 
        resource_name: Package 
        Name  : 'Microsoft Visual C++ 2013 x86 Additional Runtime - 12.0.40660' 
        ProductId : ''
        Arguments : '/Install /quiet /norestart'
        Ensure :  'Present'
        Path : 'C:\Temp\sources\Packages\AOClient\2013\vcredist_x86.exe'
        LogPath : 'c:\Windows\Installer\Visual_C++_2013_x86_Redist.log' 
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2013 x64;  AppId -  
      win_dsc: 
        resource_name: Package 
        Name  : 'Microsoft Visual C++ 2013 x64 Additional Runtime - 12.0.40660' 
        ProductId : ''
        Arguments : '/Install /quiet /norestart'
        Ensure :  'Present'
        Path : 'C:\Temp\sources\Packages\AOClient\2013\vcredist_x64.exe'
        LogPath : 'c:\Windows\Installer\Visual_C++_2013_x64_Redist.log'
      delegate_to: "{{ HostNameFact }}"
   
    - name: Install Visual C++ 2015_2022_x64_x86;  AppId -  1_C_plus_plus
      win_dsc: 
        resource_name: InstallerClass
        PackageName : 'Install_Visual_C++_2015_2022'
        Ensure :  'Present'
        Executable : 'Install.cmd'
        Source : 'C:\Temp\sources\Packages\AOClient\C++_2015-2022\'
      delegate_to: "{{ HostNameFact }}"

    - name: Install .Net6 Desktop Runtime x86;  AppId - ?
      win_dsc: 
        resource_name: InstallerClass
        PackageName : 'Install_Net6DesktopRuntime'
        Ensure :  'Present'
        Executable : 'Install.cmd'
        Source : 'C:\Temp\sources\Packages\AOClient\Net6DesktopRuntime\'
      delegate_to: "{{ HostNameFact }}"

    - name: Reboot Action before VDA Install
      win_reboot:
        post_reboot_delay: 30
        reboot_timeout: 1500
        
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Citrix_Virtual_Desktop_Agent_Server_OS_2411;  AppId - ?; 
      win_dsc: 
        resource_name: InstallerClass 
        PackageName : 'VDAServerOS'
        Ensure :  'Present'
        Executable : 'VDAWorkstationSetup_2411_RAPPS.cmd'
        Source : 'C:\Temp\sources\Packages\AOClient\SingleSession\'
        DetectionFilePath : 'C:\Program Files\Citrix\Virtual Desktop Agent\BrokerAgent.exe'
      delegate_to: "{{ HostNameFact }}"
      
    - name: BrokerAgent and citrix print service delay actions
      win_dsc: 
        resource_name: Registry 
        Ensure      : 'Present'  
        Key         : "{{ item }}"
        ValueName   : 'DelayedAutostart'
        ValueType   : 'DWORD'
        ValueData   : '1'
        Force       : true
      loop:
       - 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\BrokerAgent' 
       - 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\cpsvc'

#Delete the source directory and files bedore proceeding for the 'avc-apm'
    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
         - 'sources'

# # ###################################################################################################################################################################
# # #    Office Package copy and installtion
# # ###################################################################################################################################################################

    - name: Ensure PackageInstallationTracker directory exists for /source/packages
      win_file:
        path: C:\Temp\sources\Packages\AOClient\
        state: directory

    - name: Copy OfficeM365 packages from UNC path to temp
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\AOClient\'
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\OfficeM365_DCC'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}" 

    - name: Reboot Action before Office Install
      win_reboot:
        post_reboot_delay: 30
        reboot_timeout: 1500
        
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: MS_Office365 64bit (Build 16.0.17328.20612);  AppId - ?
      win_dsc: 
        resource_name: InstallerClass 
        PackageName : 'Office_365_64bit'
        DetectionProductRegistryKeys : 'HKLM:\Software\Microsoft\Office\ClickToRun\Configuration'
        Ensure :  'Present'
        Executable : 'AVCDCC_64-bit_configure.cmd'
        Source : 'C:\Temp\sources\Packages\AOClient\OfficeM365_DCC\'
      delegate_to: "{{ HostNameFact }}"

#Delete the source directory and files bedore proceeding for the 'avc-apm'
    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
         - 'sources'

################################################################################
