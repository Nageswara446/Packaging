---
- name:  Enter the Matrix to get hostname.
  hosts: localhost
  connection: local
  gather_facts: true
  
  tasks:
    - name: add host to local inventory
      add_host:
        groups: VDI_STD_Master_Local
        name: "{{ HostNameFact }}"

- name:  VDI AVCDedicated Build playbook
  hosts: VDI_STD_Master_Local
  vars: 
      ansible_connection: winrm
      ansible_port: 5985
      ansible_winrm_read_timeout_sec: 900
      ansible_winrm_server_cert_validation: ignore
      ansible_winrm_transport: credssp
      reboot_timeout: 3000
      OfficeSKU: "{{ OfficeSKU }}"
      PackagingTool: "{{ PackagingTool }}"
      AOClient: "{{ AOClient }}"
      AdminRights: "{{ AdminRights }}"
      EmailAddress: "{{ EmailAddress }}"
      domain_password: "{{ domain_password }}"
      domain_username: "{{ domain_username }}"

  gather_facts: false
  tasks:
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Ensure PackageInstallationTracker directory exists for /source/package
      win_file:
        path: C:\Temp\sources\Packages\DedCAVCPOC\
        state: directory

    - name: Ensure PackageInstallationTracker directory exists for /CoreApps Packages
      win_file:
        path: C:\Temp\avc-apm\Package\CoreApps Packages\
        state: directory

    - name: Ensure PackageInstallationTracker directory exists for /source$
      win_file:
        path: C:\Temp\source$\SE2_Packages\
        state: directory
    
    - name: Ensure PackageInstallationTracker directory exists for /source$
      win_file:
        path: C:\Temp\Allianz_packages\
        state: directory

    - name: Copy DSC Modules
      win_copy:
        src: "{{ item }}"
        dest: C:\Program Files\WindowsPowerShell\Modules
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\HCL\DSC\'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"

    - name: Copy Folders
      win_copy:
        src: "{{ item }}"
        dest: C:\Windows
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Copy\AVC'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Copy\SysWOW64'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"


################################################################################
#Copy and installtion of packages in /source/packages directory
################################################################################
    - name: Ensure PackageInstallationTracker directory exists for /source/packages
      win_file:
        path: C:\Temp\sources\Packages\DedCAVCPOC\
        state: directory

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\DedCAVCPOC\'
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\Microsoft\Visual_Studio_Redistributables\C++_2012'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\LanguagesAndOptionalFeatures'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Visual_Studio_Redistributables\2013'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\Microsoft\Visual_Studio_Redistributables\C++_2015-2022'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\Net6DesktopRuntime'
          
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"

    - name: Reboot before LanguagePack Install
      win_reboot:
        post_reboot_delay: 30  
        reboot_timeout: 1500
      
    - name: Installation of LanguagePacks
      win_dsc: 
        resource_name: InstallerClass 
        PackageName         : 'Languagepacks'
        Ensure              : 'Present'
        Executable          : 'AVC_install.cmd'
        Source              : 'C:\Temp\sources\Packages\DedCAVCPOC\LanguagesAndOptionalFeatures\'
        DetectionFilePath   : 'C:\Windows\Installer\install_languagepacks.log'
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2012 x86;  AppId -  
      win_dsc: 
        resource_name: Package 
        Name  : 'Microsoft Visual C++ 2012 x86 Additional Runtime - 11.0.61030' 
        ProductId : ''
        Arguments : '/Q'
        Ensure :  'Present'
        Path : 'C:\Temp\sources\Packages\DedCAVCPOC\C++_2012\vcredist_x86.exe'
        LogPath : 'c:\Windows\Installer\Visual_C++_2012_x86_Redist.log' 
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2013 x86;  AppId -  
      win_dsc: 
        resource_name: Package 
        Name  : 'Microsoft Visual C++ 2013 x86 Additional Runtime - 12.0.40660' 
        ProductId : ''
        Arguments : '/Install /quiet /norestart'
        Ensure :  'Present'
        Path : 'C:\Temp\sources\Packages\DedCAVCPOC\2013\vcredist_x86.exe'
        LogPath : 'c:\Windows\Installer\Visual_C++_2013_x86_Redist.log' 
      delegate_to: "{{ HostNameFact }}"

    - name: Install Visual C++ 2013 x64;  AppId -  
      win_dsc: 
        resource_name: Package 
        Name  : 'Microsoft Visual C++ 2013 x64 Additional Runtime - 12.0.40660' 
        ProductId : ''
        Arguments : '/Install /quiet /norestart'
        Ensure :  'Present'
        Path : 'C:\Temp\sources\Packages\DedCAVCPOC\2013\vcredist_x64.exe'
        LogPath : 'c:\Windows\Installer\Visual_C++_2013_x64_Redist.log'
      delegate_to: "{{ HostNameFact }}"
   
    - name: Install Visual C++ 2015_2022_x64_x86;  AppId -  1_C_plus_plus
      win_dsc: 
        resource_name: InstallerClass
        PackageName : 'Install_Visual_C++_2015_2022'
        Ensure :  'Present'
        Executable : 'Install.cmd'
        Source : 'C:\Temp\sources\Packages\DedCAVCPOC\C++_2015-2022\'
      delegate_to: "{{ HostNameFact }}"

    - name: Install .Net6 Desktop Runtime x86;  AppId - ?
      win_dsc: 
        resource_name: InstallerClass
        PackageName : 'Install_Net6DesktopRuntime'
        Ensure :  'Present'
        Executable : 'Install.cmd'
        Source : 'C:\Temp\sources\Packages\DedCAVCPOC\Net6DesktopRuntime\'
      delegate_to: "{{ HostNameFact }}"

#Delete the source directory and files bedore proceeding for the 'avc-apm'
    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
         - 'sources'

# # ###################################################################################################################################################################
# # #    Office Package copy and installtion
# # ###################################################################################################################################################################

    - name: Ensure PackageInstallationTracker directory exists for /source/packages
      when: OfficeSKU
      win_file:
        path: C:\Temp\sources\Packages\DedCAVCPOC\
        state: directory

    - name: Copy OfficeM365 packages from UNC path to temp
      when: OfficeSKU
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\DedCAVCPOC\'
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\OfficeM365_DCC'
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}" 

    - name: Reboot Action before Office Install
      when: OfficeSKU
      win_reboot:
        post_reboot_delay: 30
        reboot_timeout: 1500
        
    - name: Wait for WinRM
      when: OfficeSKU
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: MS_Office365 64bit (Build 16.0.17328.20612);  AppId - ?
      when: OfficeSKU
      win_dsc: 
        resource_name: InstallerClass 
        PackageName : 'Office_365_64bit'
        DetectionProductRegistryKeys : 'HKLM:\Software\Microsoft\Office\ClickToRun\Configuration'
        Ensure :  'Present'
        Executable : 'AVCDCC_64-bit_configure.cmd'
        Source : 'C:\Temp\sources\Packages\DedCAVCPOC\OfficeM365_DCC\'
      delegate_to: "{{ HostNameFact }}"

#Delete the source directory and files bedore proceeding for the 'avc-apm'
    - name: Clean up all files and folders in C:\Temp
      when: OfficeSKU
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
         - 'sources'

################################################################################
#Copy and installtion of packages in /source/packages directory
################################################################################

    - name: Ensure PackageInstallationTracker directory exists for /source/packages
      win_file:
        path: C:\Temp\sources\Packages\DedCAVCPOC\
        state: directory

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\DedCAVCPOC\'
        remote_src: yes
      loop:
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\674_Qualys_CloudAgent_5.6.0.20_PKG_R1'
        - '\\aalmcspar001.wwg00m.rootdom.net\sources\Packages\OneAVC\CrowdStrike\Current'        
      become: true
      become_method: runas
      become_flags: 'logon_type=new_credentials logon_flags=netcredentials_only'
      vars:
        ansible_become_user: "{{ domain_username }}"
        ansible_become_pass: "{{ domain_password }}"

    - name: 674_Qualys_CloudAgent_5.6.0.20_PKG_R1;  AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName         : '674_Qualys_CloudAgent_5.6.0.20_PKG_R1'
        Ensure              : 'Present'
        Executable          : 'Deploy-Application.exe'
        Source              : 'C:\Temp\sources\Packages\DedCAVCPOC\674_Qualys_CloudAgent_5.6.0.20_PKG_R1\'
        DetectionProductRegistryKeys : 'HKLM:\SOFTWARE\AVC\Packages\674_Qualys_CloudAgent_5.6.0.20_PKG_R1'
      delegate_to: "{{ HostNameFact }}"

#Citrix Optimizer Tool
    - name: CitrixOptimizerTool
      win_shell: C:\Windows\AVC\CitrixOptimizerTool\CtxOptimizerEngine.ps1 -Source Citrix_Windows_11_2009_OneAVC_Packaging.xml -Mode execute
      ignore_errors: true

# Set SYSTEM Proxy for update section

    - name: Set a proxy with a specific port with a bypass list
      win_http_proxy:
        proxy: zsc-fra.emea.lb.sec.allianz:8080

    - name: Add Microsoft UWP application
      win_shell: C:\Windows\AVC\Scripts\BUILD\AddUWPapps.ps1
      ignore_errors: true
    
# Removal of SYSTEM proxy

    - name: Remove any proxy settings
      win_http_proxy:
        proxy: ''
        bypass: ''

    ###     When we get new version of crowdstrike, just copy the file "WindowsSensor.LionLanner.exe" to the oneavc source path.     ####
    ###     Do not replace the "install.cmd" file in oneavc source path as this is specificlly designed for Oneavc                   ####
    ###     CrowdStrike 7.12 as part of PR009_24                                                                                     ####
    - name: CrowdStrike 7.19; AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName         : 'CrowdStrike'  ## After installation of CrowdStrike, do not reboot.
        Ensure              : 'Present'
        Executable          : 'Install.cmd'
        Source              : 'C:\Temp\sources\Packages\DedCAVCPOC\Current\'
        DetectionProductRegistryKeys     : 'HKLM:\SOFTWARE\CrowdStrike'
      delegate_to: "{{ HostNameFact }}"

    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
        - 'Allianz_packages'
        - 'avc-apm'
        - 'sources'
        - 'source$'





