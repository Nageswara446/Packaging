        resource_name: InstallerClass 
        PackageName         : 'Cisco_Webex_44.6.0.30115'
        Ensure              : 'Present'
        Executable          : 'Deploy-Application.exe'
        Source              : 'C:\Temp\avc-apm\Package\CoreApps Packages\25833_Cisco_Webex_44.6.0.30115_PKG_R1\'
        DetectionProductUninstallRegKeyValue         : '{D0AF510D-1DAA-5AE4-BCDA-3FDAB2AE84C8}'  
