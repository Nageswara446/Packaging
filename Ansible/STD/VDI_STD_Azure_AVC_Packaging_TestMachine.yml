---
- name: Enter the Matrix to get hostname.
  hosts: localhost
  connection: local
  gather_facts: true
  collections:
    - ansible.windows
    - community.windows

  tasks:
    - name: add host to local inventory
      add_host:
        groups: VDI_STD_Master_Local
        name: "{{ HostNameFact }}"

- name: VDI AVCDedicated Build playbook
  hosts: VDI_STD_Master_Local
  collections:
    - ansible.windows
    - community.windows

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_read_timeout_sec: 900
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: credssp
    reboot_timeout: 3000
    OfficeSKU: "{{ OfficeSKU }}"
    PackagingTool: "{{ PackagingTool }}"
    AOClient: "{{ AOClient }}"
    AdminRights: "{{ AdminRights }}"
    EmailAddress: "{{ EmailAddress }}"

  gather_facts: false
  tasks:
    - name: Wait for WinRM
      wait_for_connection:
        delay: 10
        timeout: 3000

    - name: Ensure PackageInstallationTracker directory exists for /source/package
      win_file:
        path: C:\Temp\sources\Packages\DedCAVCPOC\
        state: directory

    - name: Copy DSC Modules
      win_copy:
        src: "{{ item }}"
        dest: C:\Program Files\WindowsPowerShell\Modules
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\HCL\DSC\'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Copy Folders
      win_copy:
        src: "{{ item }}"
        dest: C:\Windows
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\AVC'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\RAPPS\Copy\SysWOW64'
      become: true
      become_method: runas
      become_flags: "logon_type=new_credentials logon_flags=netcredentials_only"
      vars:
        ansible_become_user: "{{ sa_username }}"
        ansible_become_pass: "{{ access_key }}"

    - name: Add shortcut for VM Decommission
      win_shell: powershell.exe -ExecutionPolicy Bypass -File "C:\Windows\AVC\Scripts\USER\WPS-ADP-Jenkins\SelfServiceVMDecommission\ShortCut.ps1"
    
    - name: Add shortcut for SnapshotProvisioning
      win_shell: powershell.exe -ExecutionPolicy Bypass -File "C:\Windows\AVC\Scripts\USER\WPS-ADP-Jenkins\SelfSnapshotProvisioning\SnapshotShortcut.ps1"

    - name: Add shortcut for Restore Snapshot
      win_shell: powershell.exe -ExecutionPolicy Bypass -File "C:\Windows\AVC\Scripts\USER\WPS-ADP-Jenkins\SelfSnapshotDecommision\RestoreSnapshotShortcut.ps1"

    ################################################################################
    #Copy and installtion of packages in /source/packages directory
    ################################################################################

    - name: Copy packages from UNC path to temp from /source/packages
      win_copy:
        src: "{{ item }}"
        dest: 'C:\Temp\sources\Packages\DedCAVCPOC\'
        remote_src: yes
      loop:
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\LanguagesAndOptionalFeatures'
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\2840_Microsoft_WindowsDesktopRuntime_8.0.21_PKG_R1'
        # - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\OfficeM365\64Bit\16.0.17928.20572' #new
        - '\\rappsce1repo.file.core.windows.net\sources\Packages\Microsoft\OneDrive\singlesession\31059_Microsoft_OneDrive_25.224.1116.0003_PKG_R1'
