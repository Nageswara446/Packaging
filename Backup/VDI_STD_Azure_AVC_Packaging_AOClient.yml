    - name: 674_Qualys_CloudAgent_5.6.0.20_PKG_R1;  AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName         : '674_Qualys_CloudAgent_5.6.0.20_PKG_R1'
        Ensure              : 'Present'
