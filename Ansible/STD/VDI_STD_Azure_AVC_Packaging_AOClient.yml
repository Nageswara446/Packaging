      ignore_errors: true

    - name: Start Menu Customization
      win_shell: regedit.exe /s C:\Windows\AVC\Scripts\BUILD\Mods\MEMpolicy.reg
      ignore_errors: true

    #Start menu may stop https://support.citrix.com/s/article/CTX692398-start-menu-may-stop-responding-if-december-2024-or-newer-security-updates-installed-on-windows-11?language=en_US
    - name: Add registry edit for Citrix Hooks
      win_regedit:
        path: 'HKLM:\SOFTWARE\Citrix\CtxHook\AppInit_DLLs\UWPBridgeHook\startmenuexperiencehost.exe\Citrix.Hooking.Uwp.dll\CtxWinUiXamlHook.dll\vccorlib140_app.dll'
        name: "FilePathName"
        data: 'C:\Windows\SystemApps\MicrosoftWindows.Client.Photon_cw5n1h2txyewy\vccorlib140_app.dll'
        type: string
        state: present
        force: yes

    - name: Add registry entry for VCRUNTIME140_1_APP.dll
      win_regedit:
        path: 'HKLM:\SOFTWARE\Citrix\CtxHook\AppInit_DLLs\UWPBridgeHook\startmenuexperiencehost.exe\Citrix.Hooking.Uwp.dll\CtxWinUiXamlHook.dll\VCRUNTIME140_1_APP.dll'
        name: "FilePathName"
        data: 'C:\Windows\SystemApps\MicrosoftWindows.Client.Photon_cw5n1h2txyewy\VCRUNTIME140_1_APP.dll'
        type: string
        state: present
        force: yes

    - name: Set registry value for LogoffCheckSysModules
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Citrix\wfshell\TWI'
        name: "LogoffCheckSysModules"
        data: "Analytics.exe,SelfService.exe,UpmUserMsg.exe,UiPathRemoteRuntime.exe, sbus.exe, sapcms.exe, fwcMgmt.exe, sbus.exe32, fwcMgmt.exe32, EnterpriseAgent.exe, EnterpriseAgent.exe32, adb.exe, adb.exe32, splwow64.exe, cs5ServiceManager.exe, cs6servicemanager.exe, Dserui.exe, taskhAppVShNotify.exe, taskhost.exe, rsshagent.exe, hpwuschd2.exe, deadem.exe, vmtoolsd.exe, buildnotification.exe, wfshell.exe, reg.exe, acroRD32.exe, robocopy.exe, winlogon.exe, PTIM.exe, csrss.exe, dwm.exe, LogonUI.exe, IdentityAgent.exe, OneDrive.exe, Microsoft.Sharepoint.exe"
        type: string
