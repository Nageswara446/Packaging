#Citrix Optimizer Tool
    - name: CitrixOptimizerTool
      win_shell: C:\Windows\AVC\CitrixOptimizerTool\CtxOptimizerEngine.ps1 -Source Citrix_Windows_11_2009_AOClient.xml -Mode execute
      ignore_errors: true


    - name: Set registry value for LogoffCheckSysModules
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Citrix\wfshell\TWI'
        name: 'LogoffCheckSysModules'
        data: 'Analytics.exe,SelfService.exe,UpmUserMsg.exe,UiPathRemoteRuntime.exe, sbus.exe, sapcms.exe, fwcMgmt.exe, sbus.exe32, fwcMgmt.exe32, EnterpriseAgent.exe, EnterpriseAgent.exe32, adb.exe, adb.exe32, splwow64.exe, cs5ServiceManager.exe, cs6servicemanager.exe, Dserui.exe, taskhAppVShNotify.exe, taskhost.exe, rsshagent.exe, hpwuschd2.exe, deadem.exe, vmtoolsd.exe, buildnotification.exe, wfshell.exe, reg.exe, acroRD32.exe, robocopy.exe, winlogon.exe, PTIM.exe, csrss.exe, dwm.exe, LogonUI.exe, IdentityAgent.exe, OneDrive.exe, Microsoft.Sharepoint.exe'
        type: string
        state: present

# Set SYSTEM Proxy for update section

    - name: Set a proxy with a specific port with a bypass list
      win_http_proxy:
        proxy: zsc-fra.emea.lb.sec.allianz:8080

    - name: Add Microsoft UWP application
      win_shell: C:\Windows\AVC\Scripts\BUILD\AddUWPapps.ps1
      ignore_errors: true
    
# Removal of SYSTEM proxy

    - name: Remove any proxy settings
      win_http_proxy:
        proxy: ''
        bypass: ''

    ###     When we get new version of crowdstrike, just copy the file "WindowsSensor.LionLanner.exe" to the oneavc source path.     ####
    ###     Do not replace the "install.cmd" file in oneavc source path as this is specificlly designed for Oneavc                   ####
    ###     CrowdStrike 7.12 as part of PR009_24                                                                                     ####
    - name: CrowdStrike 7.19; AppId - ?
      win_dsc:
        resource_name: InstallerClass
        PackageName         : 'CrowdStrike'  ## After installation of CrowdStrike, do not reboot.
        Ensure              : 'Present'
        Executable          : 'Install.cmd'
        Source              : 'C:\Temp\sources\Packages\AOClient\Current\'
        DetectionProductRegistryKeys     : 'HKLM:\SOFTWARE\CrowdStrike'
      delegate_to: "{{ HostNameFact }}"

#Scheduled Task for local admin rights
    - name: Run ScheduledTask.ps1 securely
      win_shell: C:\Windows\AVC\Scripts\BUILD\ScheduledTask.ps1 -AdminUser "{{ ansible_user }}" -AdminPassword "{{ ansible_password }}"
      ignore_errors: true

    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
        - 'Allianz_packages'
        - 'avc-apm'
        - 'sources'
        - 'source$'





