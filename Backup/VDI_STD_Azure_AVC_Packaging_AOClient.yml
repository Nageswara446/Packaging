        remote_src: yes
      loop:
          #- '\\aalmcspar001.wwg00m.rootdom.net\Allianz_packages\Citrix\Citrix_Workspace\26683_Citrix_Workspace_24.2.1000.1016_PKG_R1'
          - '\\AALMCSPAR001.wwg00m.rootdom.net\Allianz_packages\Allianz\AZCA Manager\03.00.6000'
          - '\\AALMCSPAR001.wwg00m.rootdom.net\Allianz_packages\LogMein\11.9.0.14'
