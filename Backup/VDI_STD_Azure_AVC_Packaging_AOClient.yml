        - '\\wwg00m.rootdom.net\AVC-APM\Package\CoreApps Packages\25833_Cisco_Webex_44.6.0.30115_PKG_R1\Package\25833_Cisco_Webex_44.6.0.30115_PKG_R1'
        - '\\wwg00m.rootdom.net\avc-apm\Package\CoreApps Packages\25119_Adobe_AcrobatReaderDC_24.002.20759_PKG_R1\Package\25119_Adobe_AcrobatReaderDC_24.002.20759_PKG_R1'

      become: true
      become_method: runas
