################# WSUS PART ###################################
    - name: WinUpdateFix. Clear SoftwareDistribution to prevent DB corruption
      win_shell: |
        $ErrorActionPreference = 'Stop'
        Stop-Service -Name wuauserv -Force
        Start-Sleep -Seconds 10
        Remove-Item -Path 'C:\Windows\SoftwareDistribution' -Recurse -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 10
        Start-Service -Name wuauserv
      register: winupdatefix
      retries: 3
      delay: 20
      until: winupdatefix is succeeded
      ignore_errors: yes

    - name: Ensure Windows Update service is enabled and running
      win_service:
        name: wuauserv
        start_mode: auto
        state: started
        force_dependent_services: yes
      register: windows_update
      retries: 5
      delay: 20
      until: windows_update is succeeded
      ignore_errors: true

    - name: WSUS registry key values
      win_dsc:
        resource_name: Registry
        Ensure    : 'Present'
        Key       : "{{ item.Key }}"
        ValueName : "{{ item.ValueName }}"
        ValueType : "{{ item.ValueType }}"
        ValueData : "{{ item.ValueData }}"
        Force     : true
      loop:
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate',       ValueName: 'DoNotConnectToWindowsUpdateInternetLocations', ValueType: 'DWORD', ValueData: '0' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU',   ValueName: 'UseWUServer',                                ValueType: 'DWORD', ValueData: '1' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU',   ValueName: 'AutoInstallMinorUpdates',                    ValueType: 'DWORD', ValueData: '0' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU',   ValueName: 'NoAutoUpdate',                               ValueType: 'DWORD', ValueData: '1' }
        - {Key: 'HKEY_LOCAL_MACHINE\SOFTWARE\Wow6432Node\Citrix\Dazzle',                     ValueName: 'ConfigMgrSupportEnabled',                    ValueType: 'String', ValueData: 'false' }
      register: wsus_registry_values
      retries: 5
      delay: 60
      until: wsus_registry_values is succeeded

    - name: WSUS server set internal server
      win_dsc:
        resource_name: Registry
        Ensure    : 'Present'
        Key       : 'HKEY_LOCAL_MACHINE\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate'
        ValueName : "{{ item }}"
        ValueType : 'String'
        ValueData : 'http://aalwsufrk101.wwg00m.rootdom.net:8530'
        Force     : true
      loop:
        - 'WUServer'
        - 'WUStatusServer'
        - 'UpdateServiceUrlAlternate'
      register: wsus_server
      retries: 5
      delay: 60
      until: wsus_server is succeeded

    - name: Reboot after WSUS configuration
      win_reboot:
        post_reboot_delay: 120
      register: reboot_after_wsus
      retries: 5
      delay: 60
      until: reboot_after_wsus is succeeded

    - name: Install Defender / Windows Security platform updates from WSUS
      win_updates:
        server_selection: managed_server
        category_names:
          - DefinitionUpdates
        state: installed
        reboot: no
        log_path: C:\Windows\AVC\Logging\ansible_defender_updates_STD.txt
      register: defender_updates
      retries: 3
      delay: 60
      until: defender_updates is succeeded

    - name: Install all other approved updates from WSUS
      win_updates:
        server_selection: managed_server
        category_names:
          - Application
          - Connectors
          - CriticalUpdates
          #- DefinitionUpdates
          - DeveloperKits
          - FeaturePacks
          - Guidance
          - SecurityUpdates
          - ServicePacks
          - Tools
          - UpdateRollups
          - Updates
        blacklist:
          #- KB3104046
        state: installed
        reboot: no
        log_path: C:\Windows\AVC\Logging\ansible_updates_STD.txt
      register: install_updates
      retries: 2
      delay: 60
      until: install_updates is succeeded

    - name: Reboot if required by Defender updates
      win_reboot:
        post_reboot_delay: 300
      when: defender_updates.reboot_required | default(false)

    - name: Ensure WinRM starts when the system has settled and is ready to work reliably
      win_service:
        name: WinRM
        start_mode: delayed
      register: winrm_start
      retries: 5
      delay: 60
      until: winrm_start is succeeded

    - name: Final reboot after WSUS part
      win_reboot:
        post_reboot_delay: 120
      register: reboot_final
      retries: 5
      delay: 60
      until: reboot_final is succeeded

################# WSUS PART END ##############################

