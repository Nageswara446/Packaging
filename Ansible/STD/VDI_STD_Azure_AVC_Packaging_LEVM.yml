    - name: Baseline_VMscan PS to generate vulnerability report and place it in storage account
      win_command: |
        PowerShell -Command "& 'C:\Temp\Baseline_VMscan.ps1' -ARCHIVESTORAGEACCOUNTNAME '{{ Archivestorageaccountname }}' -username '{{ custom_username }}' -password '{{ custom_password }}' -ARCHIVECONTAINERNAME '{{ Archivecontainername }}' -StorageAccountAccessKey '{{ filehshare_access_key }}'"
    

    

    # Removal of system proxy
    - name: Remove any proxy settings
      win_http_proxy:
        proxy: ''
        bypass: ''
    
    - name: Zscaler ;  AppId -
      win_dsc:
        resource_name: InstallerClass
        PackageName: "28812_Zscaler_ClientConnector_4.5.0.352_PKG_R1"
        Source: 'C:\Temp\sources\Packages\28812_Zscaler_ClientConnector_4.5.0.352_PKG_R1_AO\'
        Executable: "Deploy-Application.exe"
        Ensure: Present
        DetectionProductUninstallRegKeyValue: "{1587F99E-730F-40F5-9222-DFEE25F64BED}"
      delegate_to: "{{ HostNameFact }}"
      ignore_errors: true
    
    - name: Remove system WinHTTP proxy
      win_http_proxy:
        state: absent


# ################# END OF APP INSTALL PART ########################

    - name: Clean up all files and folders in C:\Temp
      win_file:
        path: 'C:\Temp\{{ item }}'
        state: absent
      loop:
        - "Allianz_packages"
        - "avc-apm"
        - "sources"
        - "source$"
